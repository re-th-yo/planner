<style>
*{box-sizing:border-box;margin:0;padding:0;cursor:none!important;}
html,body{height:100%;background:#111110;color:#f0ede8;overflow:hidden;}
#cursor{position:fixed;pointer-events:none;z-index:9999;top:0;left:0;will-change:transform;}
#cursor-dot{width:10px;height:10px;border-radius:50%;background:#c9ff00;transform:translate(-50%,-50%);transition:width .1s,height .1s,background .1s;}
:root{--accent:#c9ff00;--accent-rgb:201,255,0;}
#app{font-family:'Barlow','Helvetica Neue',Helvetica,Arial,sans-serif;background:#111110;height:100vh;display:flex;flex-direction:column;}
#header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 12px;border-bottom:1px solid #2a2a28;background:#111110;flex-shrink:0;}
#week-label{font-size:11px;font-weight:800;color:#6a6760;letter-spacing:.12em;text-transform:uppercase;}
#week-nav{display:flex;gap:6px;align-items:center;}
#week-nav button{background:none;border:1px solid #2e2e2c;border-radius:6px;padding:5px 12px;font-size:11px;font-weight:800;font-family:'Barlow',sans-serif;color:#9a9690;cursor:pointer;letter-spacing:.06em;text-transform:uppercase;transition:background .1s,color .1s;}
#week-nav button:hover{background:#1e1e1c;color:#f0ede8;}
#today-btn{background:var(--accent)!important;color:#111110!important;border-color:transparent!important;}
#reset-btn{color:#e05c5c!important;border-color:#3d2020!important;}
#reset-btn:hover{background:#2a1515!important;}
#save-btn{color:#111110!important;background:var(--accent)!important;border-color:transparent!important;}
#save-btn:hover{opacity:.9!important;}
#undo-btn,#redo-btn{font-size:14px!important;padding:4px 10px!important;}
#undo-btn:disabled,#redo-btn:disabled{opacity:.3!important;}
#grid-wrap{display:flex;flex:1;overflow:hidden;}
#time-col{width:52px;flex-shrink:0;background:#111110;position:relative;overflow:hidden;}
.time-label{position:absolute;left:0;right:0;height:0;overflow:visible;display:flex;align-items:flex-start;justify-content:flex-end;padding-right:10px;pointer-events:none;}
#days-wrap{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;}
#days-header{display:flex;flex-shrink:0;background:#111110;border-bottom:1px solid #2a2a28;}
#days-scroll{flex:1;overflow-y:scroll;}
#days-scroll::-webkit-scrollbar{width:0;}

#days-grid{display:flex;position:relative;}
.day-head{flex:1;padding:8px 4px;text-align:center;}
.day-head .dow{font-size:10px;font-weight:800;color:#4e4d4a;text-transform:uppercase;letter-spacing:.1em;}
.day-head .dom{font-size:21px;font-weight:800;color:#f0ede8;line-height:1.15;margin-top:2px;}
.day-head.today .dow{color:var(--accent);}
.day-head.today .dom{background:var(--accent);color:#111110;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;margin:2px auto 0;font-size:14px;}
.day-col{flex:1;border-right:1px solid #1e1e1c;position:relative;min-width:0;}
.day-col:last-child{border-right:none;}
.hour-slot{border-bottom:1px solid #2c2c2a;cursor:crosshair;position:absolute;left:0;right:0;}
.hour-slot:hover{background:rgba(var(--accent-rgb),.025);}

.event-block{
  position:absolute;left:3px;right:3px;border-radius:5px;
  font-family:'Barlow',sans-serif;overflow:hidden;z-index:5;
  display:flex;align-items:center;justify-content:center;
  cursor:grab;
  background:rgba(var(--accent-rgb),.12);border:1px solid rgba(var(--accent-rgb),.35);color:var(--accent);
}
.event-block:active{cursor:grabbing;}
.event-block .ev-title{
  font-weight:800;font-size:11px;letter-spacing:.02em;
  position:absolute;bottom:5px;left:7px;right:7px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  line-height:1.2;
}
.event-block .ev-icon{
  display:flex;align-items:center;justify-content:center;
  width:100%;height:100%;padding:8px;
}
.event-block svg,.event-block svg path,.event-block svg rect,.event-block svg circle,.event-block svg ellipse,.event-block svg polygon,.event-block svg polyline{fill:var(--accent)!important;}
.event-block .ev-icon svg{width:100%;height:100%;max-width:100%;max-height:100%;}
.resize-handle{position:absolute;bottom:0;left:0;right:0;height:8px;cursor:ns-resize;border-radius:0 0 5px 5px;opacity:0;transition:opacity .15s;background:rgba(0,0,0,.3);z-index:10;}
.event-block:hover .resize-handle{opacity:1;}
.event-block.is-dragging{opacity:.35;pointer-events:none;}

#drag-ghost{position:fixed;pointer-events:none;z-index:999;border-radius:5px;padding:4px 6px;font-family:'Barlow',sans-serif;font-size:11px;font-weight:800;opacity:.88;box-shadow:0 8px 32px rgba(0,0,0,.7);background:rgba(var(--accent-rgb),.2);border:1px solid rgba(var(--accent-rgb),.5);color:var(--accent);display:flex;align-items:center;justify-content:center;}
#now-line{position:absolute;left:0;right:0;height:1px;background:var(--accent);z-index:8;pointer-events:none;opacity:.6;}
#now-dot{position:absolute;left:-4px;top:-3.5px;width:7px;height:7px;border-radius:50%;background:var(--accent);}

#modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center;}
#modal{background:#161614;border-radius:12px;border:1px solid #2e2e2c;padding:24px;width:340px;max-width:95vw;}
#modal h3{font-size:11px;font-weight:800;margin-bottom:20px;color:#6a6760;letter-spacing:.14em;text-transform:uppercase;font-family:'Barlow',sans-serif;}
#modal label{font-size:10px;font-weight:800;color:#4e4d4a;display:block;margin-bottom:5px;margin-top:14px;letter-spacing:.1em;text-transform:uppercase;font-family:'Barlow',sans-serif;}
#modal input,#modal textarea{width:100%;font-size:13px;font-family:'Barlow',sans-serif;font-weight:700;border:1px solid #2a2a28;border-radius:6px;padding:8px 10px;background:#1e1e1c;color:#f0ede8;outline:none;}
#modal input::placeholder,#modal textarea::placeholder{color:#3e3d3a;}
#modal input:focus,#modal textarea:focus{border-color:var(--accent);}
#modal textarea{resize:vertical;min-height:48px;}
.modal-row{display:flex;gap:8px;}
.modal-row>div{flex:1;}
.modal-btns{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;}
.modal-btns button{font-size:11px;font-family:'Barlow',sans-serif;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:8px 16px;border-radius:6px;cursor:pointer;border:1px solid #2e2e2c;background:none;color:#6a6760;}
.modal-btns button:hover{background:#1e1e1c;color:#f0ede8;}
.btn-save{background:var(--accent)!important;color:#111110!important;border-color:transparent!important;}
.btn-save:hover{background:#d9ff33!important;}
.btn-del{color:#e05c5c!important;border-color:#3d2020!important;}
.btn-del:hover{background:#2a1515!important;color:#e05c5c!important;}
.icon-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-top:8px;}
.icon-opt{width:100%;aspect-ratio:1;border-radius:6px;border:1px solid #2a2a28;background:#1e1e1c;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:6px;transition:border-color .1s,background .1s;}
.icon-opt:hover{background:#252523;border-color:#3a3a38;}
.icon-opt.sel{border-color:var(--accent);background:rgba(201,255,0,.08);}
.icon-opt svg{fill:#5a5854;width:100%;height:100%;}
.icon-opt.sel svg{fill:var(--accent);}
.icon-opt-none{font-size:16px;color:#3e3d3a;font-weight:800;font-family:'Barlow',sans-serif;}
.icon-opt.sel .icon-opt-none{color:var(--accent);}

#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--accent);color:#111110;font-family:'Barlow',sans-serif;font-weight:800;font-size:12px;letter-spacing:.08em;text-transform:uppercase;padding:10px 20px;border-radius:8px;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:999;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#load-btn{color:#111110!important;background:var(--accent)!important;border-color:transparent!important;}
#load-btn:hover{opacity:.9!important;}
#ctx-menu{position:fixed;z-index:500;background:#1e1e1c;border:1px solid #2e2e2c;border-radius:8px;padding:4px;min-width:140px;box-shadow:0 8px 32px rgba(0,0,0,.6);font-family:'Barlow',sans-serif;}
.ctx-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:5px;font-size:12px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;color:#9a9690;transition:background .1s,color .1s;}
.ctx-item:hover{background:#2a2a28;color:#f0ede8;}
.ctx-item.danger{color:#e05c5c;}
.ctx-item.danger:hover{background:#2a1515;color:#e05c5c;}
.ctx-sep{height:1px;background:#2a2a28;margin:4px 0;}

#settings-btn{color:var(--accent)!important;border-color:rgba(201,255,0,.3)!important;}
#settings-btn:hover{background:rgba(201,255,0,.07)!important;}
#settings-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300;display:flex;align-items:center;justify-content:center;}
#settings-modal{background:#161614;border-radius:12px;border:1px solid #2e2e2c;padding:24px;width:360px;max-width:95vw;}
#settings-modal h3{font-size:11px;font-weight:800;margin-bottom:20px;color:#6a6760;letter-spacing:.14em;text-transform:uppercase;font-family:'Barlow',sans-serif;}
#settings-modal label{font-size:10px;font-weight:800;color:#4e4d4a;display:block;margin-bottom:6px;margin-top:14px;letter-spacing:.1em;text-transform:uppercase;font-family:'Barlow',sans-serif;}
.settings-row{display:flex;gap:10px;align-items:center;}
.settings-row select{flex:1;font-size:13px;font-family:'Barlow',sans-serif;font-weight:700;border:1px solid #2a2a28;border-radius:6px;padding:8px 10px;background:#1e1e1c;color:#f0ede8;outline:none;}
.settings-row select:focus{border-color:var(--accent);}
.color-swatches{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.color-swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .1s;}
.color-swatch:hover{transform:scale(1.15);}
.color-swatch.sel{border-color:#fff;box-shadow:0 0 0 1px rgba(255,255,255,.4);}
</style>
</head>
<body>
<div id="cursor"><div id="cursor-dot"></div></div>
<div id="app">
  <div id="header">
    <div id="week-label">—</div>
    <div id="week-nav">
      <button id="prev-btn">←</button>
      <button id="today-btn">Aujourd'hui</button>
      <button id="next-btn">→</button>
      <button id="undo-btn" title="Ctrl+Z">↩</button>
      <button id="redo-btn" title="Ctrl+Shift+Z">↪</button>
      <button id="save-btn">↓ Sauvegarder</button>
      <button id="load-btn">↑ Charger</button>
      <input id="file-input" type="file" accept=".json" style="display:none;"/>
      <button id="settings-btn">⚙ Paramètres</button>
      <button id="reset-btn">Reset</button>
    </div>
  </div>
  <div id="grid-wrap">
    <div id="time-col"><div id="time-inner"></div></div>
    <div id="days-wrap">
      <div id="days-header"></div>
      <div id="days-scroll">
        <div id="days-grid"></div>
      </div>
    </div>
  </div>
</div>

<div id="drag-ghost" style="display:none;"></div>
<div id="ctx-menu" style="display:none;">
  <div class="ctx-item" id="ctx-edit">✎ &nbsp;Modifier</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item danger" id="ctx-del">✕ &nbsp;Supprimer</div>
</div>

<div id="modal-bg" style="display:none;">
  <div id="modal">
    <h3 id="modal-title">Nouvelle tâche</h3>
    <label>Titre <span style="color:#3e3d3a;font-size:9px;letter-spacing:.04em;">— optionnel</span></label>
    <input id="ev-name" type="text" placeholder="Sans titre"/>
    <div class="modal-row">
      <div><label>Début</label><input id="ev-start" type="time"/></div>
      <div><label>Fin</label><input id="ev-end" type="time"/></div>
    </div>
    <label>Note <span style="color:#3e3d3a;font-size:9px;letter-spacing:.04em;">— optionnel</span></label>
    <textarea id="ev-note" placeholder="Détails..."></textarea>
    <label>Icône</label>
    <div class="icon-grid" id="icon-grid"></div>
    <div class="modal-btns">
      <button id="btn-del" class="btn-del" style="display:none;">Supprimer</button>
      <button id="btn-cancel">Annuler</button>
      <button id="btn-save" class="btn-save">Enregistrer</button>
    </div>
  </div>
</div>


<div id="settings-modal-bg" style="display:none;">
  <div id="settings-modal">
    <h3>Paramètres</h3>
    <label>Thème</label>
    <div style="display:flex;gap:8px;margin-top:8px;" id="theme-btns">
      <button onclick="applyTheme('default');updateThemeBtns();" id="theme-default" style="flex:1;font-size:11px;font-weight:800;font-family:'Barlow',sans-serif;letter-spacing:.06em;text-transform:uppercase;padding:8px;border-radius:6px;border:1px solid #2e2e2c;background:none;color:#9a9690;">Default</button>
      <button onclick="applyTheme('pastel');updateThemeBtns();" id="theme-pastel" style="flex:1;font-size:11px;font-weight:800;font-family:'Barlow',sans-serif;letter-spacing:.06em;text-transform:uppercase;padding:8px;border-radius:6px;border:1px solid #2e2e2c;background:none;color:#9a9690;">✿ Pastel</button>
    </div>
    <label>Couleur d'accent</label>
    <div style="display:flex;align-items:center;gap:12px;margin-top:8px;"><input type="color" id="accent-picker" style="width:48px;height:36px;border:1px solid #2a2a28;border-radius:6px;background:#1e1e1c;cursor:pointer;padding:2px;"/><span id="accent-hex" style="font-size:12px;font-weight:700;color:#6a6760;font-family:Barlow,sans-serif;letter-spacing:.04em;"></span></div>
    <div class="modal-btns" style="margin-top:20px;">
      <button id="settings-cancel">Annuler</button>
      <button id="settings-apply" class="btn-save">Appliquer</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
const SNAP=15;
const HH=64; // hauteur fixe par heure (px)
const HS=0,HE=24;  // grille 0h–24h fixe
const SK='weekly_planner_v4';
const DFR=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];

const ICONS={

const GIF_KEYS=['cat','paw','cinna','bow','bunnies'];
const GIF_LABELS=['Chat','Patte','Cinnamoroll','Nœud','Lapins'];

const THEMES={
  default:{name:'Default',accent:'#c9ff00',icons:'svg'},
  pastel:{name:'Pastel',accent:'#ffcef9',icons:'gif'}
};
let currentTheme='default';

function updateThemeBtns(){
  ['default','pastel'].forEach(k=>{
    const btn=document.getElementById('theme-'+k);
    if(!btn)return;
    if(k===currentTheme){btn.style.background=accentColor;btn.style.color='#111110';btn.style.borderColor='transparent';}
    else{btn.style.background='none';btn.style.color='#9a9690';btn.style.borderColor='#2e2e2c';}
  });
}
function applyTheme(themeKey){
  currentTheme=themeKey;
  const t=THEMES[themeKey];
  // Remettre la couleur par défaut du thème (écrase toute couleur custom)
  setAccent(t.accent);
  // Mettre à jour le color picker dans les settings si ouvert
  const picker=document.getElementById('accent-picker');
  if(picker)picker.value=t.accent;
  const hexEl=document.getElementById('accent-hex');
  if(hexEl)hexEl.textContent=t.accent.toUpperCase();
  // Re-render toute la grille (blocs + icônes)
  renderGrid();
  renderIconGrid();
  updateThemeBtns();
}


let accentColor='#c9ff00';
function hexToRgb(hex){const h=hex.replace('#','');return parseInt(h.slice(0,2),16)+','+parseInt(h.slice(2,4),16)+','+parseInt(h.slice(4,6),16);}
function setAccent(hex){
  accentColor=hex;
  document.documentElement.style.setProperty('--accent',hex);
  document.documentElement.style.setProperty('--accent-rgb',hexToRgb(hex));

let evs=[],wOff=0,editId=null,pendSlot=null,selIcon='none';
let drag={on:false},rsz={on:false},create={on:false};

// ── Undo/Redo ──
let undoStack=[],redoStack=[];
function pushUndo(){
  undoStack.push(JSON.stringify(evs));
  if(undoStack.length>50)undoStack.shift();
  redoStack=[];
  updateUndoUI();
}
function undo(){
  if(!undoStack.length)return;
  redoStack.push(JSON.stringify(evs));
  evs=JSON.parse(undoStack.pop());
  save();render();updateUndoUI();
}
function redo(){
  if(!redoStack.length)return;
  undoStack.push(JSON.stringify(evs));
  evs=JSON.parse(redoStack.pop());
  save();render();updateUndoUI();
}
function updateUndoUI(){
  document.getElementById('undo-btn').disabled=!undoStack.length;
  document.getElementById('redo-btn').disabled=!redoStack.length;
}

function gwd(o){
  const n=new Date(),dy=n.getDay(),m=new Date(n);
  m.setDate(n.getDate()-((dy+6)%7)+o*7);
  return Array.from({length:7},(_,i)=>{const d=new Date(m);d.setDate(m.getDate()+i);return d;});
}
function sameDay(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}
function isoWeek(d){
  const u=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  u.setUTCDate(u.getUTCDate()+4-(u.getUTCDay()||7));
  const y=new Date(Date.UTC(u.getUTCFullYear(),0,1));
  return Math.ceil((((u-y)/86400000)+1)/7);
}
function ds(d){return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;}
function p2(n){return String(n).padStart(2,'0');}
function t2m(t){const[h,m]=t.split(':').map(Number);return h*60+m;}
function m2t(m){return `${p2(Math.floor(m/60))}:${p2(m%60)}`;}
function snap(m){return Math.round(m/SNAP)*SNAP;}
function load(){try{evs=JSON.parse(localStorage.getItem(SK)||'[]');}catch{evs=[];}}
function save(){localStorage.setItem(SK,JSON.stringify(evs));}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

function exportJSON(){
  const blob=new Blob([JSON.stringify(evs,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  const d=new Date();
  a.download=`planning_${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('Planning sauvegardé ✓');
}

function importJSON(file){
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!Array.isArray(data))throw new Error();
      // Trouver la semaine source (lundi du premier event)
      const srcDates=data.map(ev=>ev.date).filter(Boolean).sort();
      if(srcDates.length===0){evs=data;save();render();showToast('Planning chargé ✓');return;}
      const srcMonday=getMondayOf(new Date(srcDates[0]));
      // Semaine cible = semaine affichée actuellement
      const tgtMonday=getMondayOf(gwd(wOff)[0]);
      const diffMs=tgtMonday-srcMonday;
      const diffDays=Math.round(diffMs/86400000);
      // Décaler toutes les dates
      const shifted=data.map(ev=>{
        if(!ev.date)return ev;
        const d=new Date(ev.date);
        d.setDate(d.getDate()+diffDays);
        return {...ev,date:ds(d)};
      });
      // Supprimer les events existants de la semaine cible, ajouter les nouveaux
      const tgtDates=new Set(gwd(wOff).map(ds));
      evs=evs.filter(ev=>!tgtDates.has(ev.date));
      evs=evs.concat(shifted);
      save();render();
      showToast('Planning chargé ✓');
    }catch(err){showToast('Fichier invalide ✗');}
  };
  reader.readAsText(file);
}
function getMondayOf(d){
  const day=new Date(d);
  const dow=day.getDay();
  day.setDate(day.getDate()-((dow+6)%7));
  day.setHours(0,0,0,0);
  return day;
}

          const topPx = (startMin/60 - HS)*HH;
          ghost.style.top = topPx + 'px';
          ghost.style.height = HH+'px';
          col.appendChild(ghost);
          create.ghost = ghost;
        }
      });
      col.appendChild(sl);
    }
    evs.filter(ev=>ev.date===ds(d)).forEach(ev=>{
      const bl=mkBlock(ev);

    });

function mkBlock(ev){
  const hh=HH;
  const smRaw=t2m(ev.start),emRaw=t2m(ev.end);
  // Clipper sur la fenêtre visible
  const sm=Math.max(smRaw,0);
  const em=Math.min(emRaw,24*60);
  if(em<=sm)return null; // entièrement hors fenêtre
  const durMin=em-sm;
  const blockH=Math.max(10,(durMin/60)*hh-2);
  const top=(sm/60-HS)*hh;
  const b=document.createElement('div');
  b.className='event-block';
  b.style.top=top+'px';
  b.style.height=blockH+'px';
  b.style.overflow='visible';
  b.dataset.id=ev.id;

  const iconKey=ev.icon||'none';
  const isGifIcon=GIF_KEYS.includes(iconKey);
  const hasIcon=iconKey!=='none'&&(ICONS[iconKey]||isGifIcon);
  const hasTitle=ev.title&&ev.title.trim()!=='';

  // Logo : taille fixe max 80px, min 40px
  const iconSize=Math.min(80,Math.max(40, blockH-8));
  // Bloc court (<90min) avec titre: logo sur le côté droit
  const sideLayout=hasIcon&&hasTitle&&durMin<90;

  let inner='';
  if(sideLayout){
    inner+=`<div style="position:absolute;inset:0;display:flex;align-items:center;overflow:visible;clip-path:none;">`;
    inner+=`<span style="flex:1;min-width:0;font-weight:800;font-size:11px;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 4px 0 7px;color:inherit;">${ev.title}</span>`;
    inner+=`<div style="flex-shrink:0;width:${iconSize}px;height:${iconSize}px;display:flex;align-items:center;justify-content:center;padding:5px;">${isGifIcon?'<img src="'+GIF_ICONS[iconKey]+'" style="width:100%;height:100%;object-fit:contain;"/>':ICONS[iconKey]}</div>`;
    inner+=`</div>`;
  } else {
    if(hasIcon){
      inner+=`<div style="position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);height:${iconSize}px;display:flex;align-items:center;justify-content:center;padding:6px;">${isGifIcon?'<img src="'+GIF_ICONS[iconKey]+'" style="width:100%;height:100%;object-fit:contain;"/>':ICONS[iconKey]}</div>`;
    }
    if(hasTitle){
      inner+=`<span style="position:absolute;bottom:5px;left:7px;right:7px;font-weight:800;font-size:11px;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2;color:inherit;">${ev.title}</span>`;
    }
  }
  inner+='<div class="resize-handle"></div>';
  b.innerHTML=inner;

  b.querySelectorAll('svg').forEach(s=>{s.style.fill='';s.style.width='100%';s.style.height='100%';});

  b.querySelector('.resize-handle').addEventListener('mousedown',e=>{e.preventDefault();e.stopPropagation();startRsz(e,ev);});
  b.addEventListener('contextmenu',e=>showCtx(e,ev.id));
  b.addEventListener('mousedown',e=>{
    if(e.target.classList.contains('resize-handle'))return;
    e.preventDefault();e.stopPropagation();
    startDrag(e,ev,parseInt(b.closest('.day-col').dataset.di),b);
  });
  return b;
}

function colAtX(x){
  const cols=document.querySelectorAll('.day-col');
  for(let i=0;i<cols.length;i++){
    const r=cols[i].getBoundingClientRect();
    if(x>=r.left&&x<=r.right)return{col:cols[i],idx:i};
  }return null;
}

function startDrag(e,ev,colIdx,block){
  const br=block.getBoundingClientRect();
  const scrollTop=document.getElementById('days-scroll').scrollTop;
  const offMin=Math.round((e.clientY-br.top)/HH*60);
  const isClone=e.altKey;
  drag={on:true,evId:ev.id,colIdx,offMin,durMin:t2m(ev.end)-t2m(ev.start),clone:isClone};
  if(!isClone) block.classList.add('is-dragging');
  const ghost=document.getElementById('drag-ghost');
  ghost.style.display='flex';
  ghost.style.width=br.width+'px';
  ghost.style.height=Math.max(10,drag.durMin/60*HH-2)+'px';
  ghost.innerHTML='';

  // Badge clone
  if(isClone){
    const badge=document.createElement('div');
    badge.style.cssText='position:absolute;top:3px;right:3px;background:#c9ff00;color:#111110;font-size:9px;font-weight:800;font-family:Barlow,sans-serif;padding:1px 5px;border-radius:3px;letter-spacing:.06em;';
    badge.textContent='COPY';
    ghost.appendChild(badge);
  }
  ghost.style.left=br.left+'px';
  ghost.style.top=br.top+'px';
  document.body.style.cursor='grabbing';
  document.body.style.userSelect='none';
}

function startRsz(e,ev){
  rsz={on:true,evId:ev.id,origEnd:t2m(ev.end),origStart:t2m(ev.start)};
  document.body.style.cursor='ns-resize';
  document.body.style.userSelect='none';
}

document.addEventListener('mousemove',e=>{
  if(create.on){
    const r=create.col.getBoundingClientRect();
    // r.top inclut déjà le scroll (getBoundingClientRect est dans le viewport)
    // e.clientY - r.top = position en px depuis le haut de la colonne (0h)
    const relY=e.clientY-r.top;
    let endMin=Math.round(relY/HH)*60;
    endMin=Math.max(create.startMin+60,Math.min(24*60,endMin));
    create.endMin=endMin;
    const topPx=(create.startMin/60)*HH;
    const h=Math.max(HH,(endMin-create.startMin)/60*HH);
    if(create.ghost){create.ghost.style.top=topPx+'px';create.ghost.style.height=h+'px';}
    return;
  }
  if(drag.on){
    const hit=colAtX(e.clientX);
    const ghost=document.getElementById('drag-ghost');
    if(hit){
      const r=hit.col.getBoundingClientRect();
      const hh=HH;
      ghost.style.width=(r.width-6)+'px';
      ghost.style.left=(r.left+3)+'px';
      let sm=snap(HS*60+Math.round(((e.clientY-r.top)/hh*60)-drag.offMin));
      sm=Math.max(HS*60,Math.min(HE*60-drag.durMin,sm));
      ghost.style.top=(r.top+((sm/60-HS)*hh))+'px';
      drag._sm=sm;drag._em=sm+drag.durMin;drag._ci=hit.idx;
    }
  }
  if(rsz.on){
    const block=document.querySelector(`[data-id="${rsz.evId}"]`);
    if(!block)return;
    const col=block.closest('.day-col');
    const r=col.getBoundingClientRect();
    const hh=HH;
    let newEnd=snap(HS*60+Math.round((e.clientY-r.top)/hh*60));
    newEnd=Math.max(rsz.origStart+SNAP,Math.min(HE*60+60,newEnd));
    block.style.height=Math.max(10,(newEnd-rsz.origStart)/60*hh-2)+'px';
    rsz._end=newEnd;
  }
});

document.addEventListener('mouseup',e=>{
  if(create.on){
    if(create.ghost)create.ghost.remove();
    const startMin=create.startMin;
    const endMin=create.endMin;
    const day=create.day;
    const dateStr=ds(day);
    create={on:false};
    document.body.style.userSelect='';
    // Pré-remplir et ouvrir la modale
    editId=null;
    pendSlot={date:dateStr,hour:Math.floor(startMin/60)};
    document.getElementById('ev-name').value='';
    document.getElementById('ev-start').value=m2t(startMin);
    document.getElementById('ev-end').value=m2t(endMin);
    document.getElementById('ev-note').value='';
    selIcon='none';
    renderIconGrid();
    document.getElementById('modal-title').textContent='Nouvelle tâche';
    document.getElementById('btn-del').style.display='none';
    document.getElementById('modal-bg').style.display='flex';
    setTimeout(()=>document.getElementById('ev-name').focus(),50);
    return;
  }
  if(drag.on){
    document.getElementById('drag-ghost').style.display='none';
    const block=document.querySelector(`[data-id="${drag.evId}"]`);
    if(block)block.classList.remove('is-dragging');
    const ev=evs.find(v=>v.id===drag.evId);
    if(ev&&drag._sm!=null){
      const newDate=ds(gwd(wOff)[drag._ci!=null?drag._ci:drag.colIdx]);
      pushUndo();if(drag.clone){
        // Dupliquer l'event
        evs.push({id:Date.now()+'',date:newDate,title:ev.title,start:m2t(drag._sm),end:m2t(drag._em),note:ev.note||'',icon:ev.icon||'none'});
      } else {
        ev.date=newDate;ev.start=m2t(drag._sm);ev.end=m2t(drag._em);
      }
      save();
    }
    drag={on:false};document.body.style.cursor='';document.body.style.userSelect='';
    renderGrid();
  }
  if(rsz.on){
    const ev=evs.find(v=>v.id===rsz.evId);
    if(ev&&rsz._end){pushUndo();ev.end=m2t(rsz._end);save();}
    rsz={on:false};document.body.style.cursor='';document.body.style.userSelect='';
    renderGrid();
  }
});

function renderIconGrid(){
  const grid=document.getElementById('icon-grid');

function openModal(ev,day,hour){
  editId=ev?ev.id:null;
  pendSlot=ev?null:{date:ds(day),hour};
  document.getElementById('ev-name').value=ev?ev.title:'';
  document.getElementById('ev-start').value=ev?ev.start:m2t((hour||9)*60);
  document.getElementById('ev-end').value=ev?ev.end:m2t(((hour||9)+1)*60);
  document.getElementById('ev-note').value=ev?(ev.note||''):'';
  selIcon=ev?(ev.icon||'none'):'none';
  renderIconGrid();
  document.getElementById('modal-title').textContent=ev?'Modifier':'Nouvelle tâche';
  document.getElementById('btn-del').style.display=ev?'block':'none';

  setTimeout(()=>document.getElementById('ev-name').focus(),50);
}

function closeModal(){document.getElementById('modal-bg').style.display='none';editId=null;pendSlot=null;}

function saveEv(){
  const title=document.getElementById('ev-name').value.trim();
  const start=document.getElementById('ev-start').value;
  const end=document.getElementById('ev-end').value;
  const note=document.getElementById('ev-note').value.trim();
  if(editId){
    const ev=evs.find(e=>e.id===editId);
    if(ev){ev.title=title;ev.start=start;ev.end=end;ev.note=note;ev.icon=selIcon;}
  }else{
    evs.push({id:Date.now()+'',date:pendSlot.date,title,start,end,note,icon:selIcon});
  }
  pushUndo();save();closeModal();renderGrid();
}

function delEv(){pushUndo();evs=evs.filter(e=>e.id!==editId);save();closeModal();renderGrid();}

  if(e.key==='Escape'){hideCtx();closeModal();}
  if((e.ctrlKey||e.metaKey)&&!e.shiftKey&&e.key==='z'){e.preventDefault();undo();}
  if((e.ctrlKey||e.metaKey)&&e.shiftKey&&e.key==='z'){e.preventDefault();redo();}
  if((e.ctrlKey||e.metaKey)&&e.key==='y'){e.preventDefault();redo();}
});


// ── Settings ──
const PREF_KEY='planner_prefs_v1';
function loadPrefs(){
  try{
    const p=JSON.parse(localStorage.getItem(PREF_KEY)||'{}');
    if(p.theme)currentTheme=p.theme;
    if(p.accent)setAccent(p.accent);
    else if(p.theme)setAccent(THEMES[p.theme]?.accent||'#c9ff00');
  }catch{}
}
function savePrefs(){
  localStorage.setItem(PREF_KEY,JSON.stringify({accent:accentColor,theme:currentTheme}));
}

function openSettings(){
  const picker=document.getElementById('accent-picker');
  picker.value=accentColor;
  document.getElementById('accent-hex').textContent=accentColor.toUpperCase();
  picker.oninput=()=>{document.getElementById('accent-hex').textContent=picker.value.toUpperCase();};
  updateThemeBtns();
  document.getElementById('settings-modal-bg').style.display='flex';
}

function applySettings(){
  setAccent(document.getElementById('accent-picker').value);
  savePrefs();
  document.getElementById('settings-modal-bg').style.display='none';
}

document.getElementById('settings-btn').onclick=openSettings;
document.getElementById('settings-cancel').onclick=()=>document.getElementById('settings-modal-bg').style.display='none';
document.getElementById('settings-apply').onclick=applySettings;
document.getElementById('settings-modal-bg').addEventListener('click',e=>{if(e.target.id==='settings-modal-bg')document.getElementById('settings-modal-bg').style.display='none';});

loadPrefs();
load();
// Clamp viewStart/viewEnd au cas où des valeurs hors limites seraient en localStorage
// Re-render si la fenêtre change de taille (HH dépend de la hauteur dispo)

render();syncScroll();
document.getElementById("days-scroll").scrollTop=640;
setInterval(()=>{if(wOff===0)renderGrid();},60000);

// — Curseur custom —
const cursorEl=document.getElementById('cursor');
const cursorDot=document.getElementById('cursor-dot');
document.addEventListener('mousemove',e=>{
  cursorEl.style.transform='translate('+e.clientX+'px,'+e.clientY+'px)';
},{passive:true});

// État curseur: green (défaut), white-small (clic sur vide), black (survol event), black-small (clic event)
function setCursor(state){
  const d=cursorDot;
  if(state==='default'){
    d.style.width='10px';d.style.height='10px';d.style.background=accentColor;d.style.opacity='1';
  } else if(state==='click'){
    d.style.width='6px';d.style.height='6px';d.style.background='#ffffff';d.style.opacity='1';
  } else if(state==='event'){
    d.style.width='10px';d.style.height='10px';d.style.background='#111110';d.style.opacity='1';
    d.style.boxShadow='0 0 0 1.5px '+accentColor;
  } else if(state==='event-click'){
    d.style.width='6px';d.style.height='6px';d.style.background='#111110';d.style.opacity='1';
    d.style.boxShadow='0 0 0 1.5px '+accentColor;
  }
  if(state==='default'||state==='click') d.style.boxShadow='none';
}

document.addEventListener('mousedown',e=>{
  const onEvent=e.target.closest('.event-block');
  setCursor(onEvent?'event-click':'click');
});
document.addEventListener('mouseup',e=>{
  const onEvent=e.target.closest('.event-block');
  setCursor(onEvent?'event':'default');
});
document.addEventListener('mouseover',e=>{
  const onEvent=e.target.closest('.event-block');
  if(!drag.on&&!rsz.on) setCursor(onEvent?'event':'default');
});

</script>
